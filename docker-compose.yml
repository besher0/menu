services:
  postgres:
    image: postgres:16-alpine
    container_name: menu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: menu_user
      POSTGRES_PASSWORD: menu_password
      POSTGRES_DB: menu
    ports:
      - "5433:5432"
    volumes:
      - menu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menu_user -d menu"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  menu_postgres_data:
